name: refocus

x-app-environment: &app-environment
  DATABASE_URL: postgresql+psycopg://learning:learning_local_only@postgres:5432/learning_companion
  # Development only: production validation rejects this committed placeholder.
  SESSION_SECRET: development-only-replace-before-deploy
  APP_ENVIRONMENT: development
  APP_ORIGIN: http://127.0.0.1:8000
  SESSION_COOKIE_SECURE: "false"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learning_companion
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning_local_only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning -d learning_companion"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    environment: *app-environment
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; assert urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200"]
      interval: 5s
      timeout: 3s
      retries: 10
